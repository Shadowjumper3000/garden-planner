# Deploy the backend to Hetzner by building it directly on the server.
# Triggers on push to main touching backend files, or manually via workflow_dispatch.
#
# Required secrets:
#   INFRA_HETZNER_HOST, INFRA_HETZNER_USER, INFRA_HETZNER_SSH_KEY
#   POSTGRES_PASSWORD, JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD, GF_ADMIN_PASSWORD, DOMAIN

name: Backend — Deploy

on:
  workflow_dispatch:
    inputs:
      recreate_volumes:
        description: "Drop data volumes before deploy (DESTRUCTIVE)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      recreate_volumes:
        description: "Drop data volumes before deploy (DESTRUCTIVE)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      services: backend
      recreate_volumes: ${{ inputs.recreate_volumes == 'true' }}
    secrets:
      INFRA_HETZNER_HOST: ${{ secrets.INFRA_HETZNER_HOST }}
      INFRA_HETZNER_USER: ${{ secrets.INFRA_HETZNER_USER }}
      INFRA_HETZNER_SSH_KEY: ${{ secrets.INFRA_HETZNER_SSH_KEY }}
      INFRA_HETZNER_PORT: ${{ secrets.INFRA_HETZNER_PORT }}
      INFRA_DEPLOY_GIT_KEY: ${{ secrets.INFRA_DEPLOY_GIT_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
      GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
      DOMAIN: ${{ secrets.DOMAIN }}
