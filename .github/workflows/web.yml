# Build the React/Vite frontend Docker image (nginx), push to GHCR, deploy to Hetzner.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - push to main touching web/ or infra/web-frontend.Dockerfile
#
# Required secrets:
#   INFRA_HETZNER_HOST, INFRA_HETZNER_USER, INFRA_HETZNER_SSH_KEY
#   POSTGRES_PASSWORD, JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD, GF_ADMIN_PASSWORD

name: Frontend — Build & Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: git short-sha)"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "infra/web-frontend.Dockerfile"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="$(git rev-parse --short HEAD)"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./infra/web-frontend.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      services: frontend
      image_tag: ${{ needs.build.outputs.image_tag }}
      recreate_volumes: false
    secrets:
      INFRA_HETZNER_HOST: ${{ secrets.INFRA_HETZNER_HOST }}
      INFRA_HETZNER_USER: ${{ secrets.INFRA_HETZNER_USER }}
      INFRA_HETZNER_SSH_KEY: ${{ secrets.INFRA_HETZNER_SSH_KEY }}
      INFRA_HETZNER_PORT: ${{ secrets.INFRA_HETZNER_PORT }}
      INFRA_DEPLOY_GIT_KEY: ${{ secrets.INFRA_DEPLOY_GIT_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
      GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
      DOMAIN: ${{ secrets.DOMAIN }}
