# .air.toml
root = "."
tmp_dir = "tmp"

[build]
# Just plain old shell command. You could use `make` as well.
cmd = "go build -o tmp/garden-planner-api ./cmd/api"
# Binary file yields from `cmd`.
bin = "tmp/garden-planner-api"
# Watch these directories for changes
include_ext = ["go", "tpl", "tmpl", "html"]
# Ignore these directories and files
exclude_dir = ["assets", "tmp", "vendor"]
exclude_file = []
# Watch these directories if you want, otherwise leave empty
include_dir = []
# Exclude files that contain these strings
exclude_regex = ["_test.go"]
# Stop watching when a build fails
stop_on_error = true
# Log 
log = "air.log"

[log]
# Log time format
time = true

[color]
# Customize each part's color
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true