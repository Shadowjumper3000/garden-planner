services:
  postgres:
    image: postgres:15-alpine
    container_name: garden_planner_dev_postgres
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: garden_planner_dev
    # Only expose PostgreSQL port in development
    # Comment this out for production
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - garden-network-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: garden_planner_dev_backend
    image: garden_planner_dev_backend
    ports:
      - "8000:8080"
    environment:
      SERVER_PORT: 8080
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: garden_planner_dev
      DB_SSL_MODE: disable
      JWT_SECRET: dev_jwt_secret_not_for_production
      JWT_EXPIRATION_HOURS: 24
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://localhost:8000,http://127.0.0.1:5173,http://127.0.0.1:8000
      CORS_ALLOW_CREDENTIALS: "true"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - garden-network-dev

  frontend:
    image: node:20-alpine
    container_name: garden_planner_dev_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      # Use relative API URL for better container networking
      - VITE_API_URL=/api
    # Update the command to use the proxy configuration from vite.config.ts
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    depends_on:
      - backend
    networks:
      - garden-network-dev

volumes:
  postgres_data_dev:
    name: garden_planner_dev_postgres_data

networks:
  garden-network-dev:
    name: garden_planner_dev_network
    driver: bridge
