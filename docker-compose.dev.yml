services:
  postgres:
    image: postgres:15-alpine
    container_name: garden-planner-postgres-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: garden_planner
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - garden-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garden-planner-backend-dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go_modules:/go/pkg/mod
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: garden_planner
      DB_SSL_MODE: disable
      JWT_SECRET: dev_secret_key_change_in_production
      JWT_EXPIRATION_HOURS: 24
      CORS_ALLOW_ORIGINS: http://localhost:3000
      CORS_ALLOW_CREDENTIALS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - garden-network
    working_dir: /app
    command: [ "go", "run", "cmd/api/main.go" ]

  frontend:
    image: node:18-alpine
    container_name: garden-planner-frontend-dev
    ports:
      - "3000:8080" # Map host port 3000 to container port 8080
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080/api
    command: sh -c "npm install && npm run dev"
    networks:
      - garden-network

volumes:
  postgres_data:
    name: garden-planner-postgres-data-dev
  go_modules:
    name: garden-planner-go-modules-dev
  node_modules:
    name: garden-planner-node-modules-dev

networks:
  garden-network:
    name: garden-planner-network-dev
    driver: bridge
