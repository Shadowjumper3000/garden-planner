# Convenience dev wrapper — merges base + dev overlays.
# Usage:
#   docker compose up --build          # dev mode (host port bindings)
#   docker compose -p garden up -d     # named project
#
# Production (no host ports, external proxy network):
#   docker compose -f infra/docker-compose.base.yml \
#                  -f infra/docker-compose.prod.yml up -d

# Garden Planner — convenience dev launcher.
#
# Builds and starts all services in dev mode:
#   Web gateway  → http://localhost        (port 80)
#   Backend API  → http://localhost:8000   (direct)
#   PostgreSQL   → localhost:5432
#   Grafana      → http://localhost:3000
#
# Usage:
#   docker compose up --build          # first run / after code changes
#   docker compose up                  # subsequent runs (no rebuild)
#   docker compose down                # stop and remove containers
#
# Production (no host port bindings, behind external proxy):
#   docker compose -f infra/docker-compose.base.yml \
#                  -f infra/docker-compose.prod.yml up -d --build

include:
  - path: infra/docker-compose.base.yml
  - path: infra/docker-compose.dev.yml
