services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - garden-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Don't expose PostgreSQL port in production
    # ports are commented out for security
    # ports:
    #   - "${POSTGRES_PORT}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_backend
    image: ${PROJECT_NAME}_backend
    environment:
      SERVER_PORT: 8080
      GIN_MODE: release
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSL_MODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      CORS_ALLOW_CREDENTIALS: "true"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - garden-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${API_URL}
    container_name: ${PROJECT_NAME}_frontend
    image: ${PROJECT_NAME}_frontend
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - backend
    networks:
      - garden-network
      - cloudflared
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "cloudflare.tunnel.target=true" # Help identify this container as the tunnel target

volumes:
  postgres_data:
    name: ${PROJECT_NAME}_postgres_data

networks:
  garden-network:
    name: ${PROJECT_NAME}_network
    driver: bridge
  cloudflared:
    external: true
