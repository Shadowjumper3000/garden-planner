# ─── Development overlay ─────────────────────────────────────────────────────
# Binds all service ports to localhost for local development.
# Entry-points:
#   Web gateway  → http://localhost        (port 80)
#   Backend API  → http://localhost:8000   (direct)
#   PostgreSQL   → localhost:5432
#   Grafana      → http://localhost:3000
#
# Usage (from project root — preferred):
#   docker compose up --build
# Or directly:
#   docker compose -f infra/docker-compose.base.yml -f infra/docker-compose.dev.yml up --build

services:
  db:
    container_name: garden-planner-db-dev
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garden_dev}
    networks:
      - internal

  backend:
    container_name: garden-planner-backend-dev
    build:
      context: ../src
      dockerfile: ../infra/app.Dockerfile
    image: garden_backend_dev
    ports:
      - "${BACKEND_PORT:-8000}:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-garden}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-garden_dev}
      DB_NAME: ${POSTGRES_DB:-garden}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_not_for_production}
      JWT_EXPIRATION_HOURS: 24
      CORS_ALLOW_ORIGINS: "http://localhost,http://localhost:8000"
      CORS_ALLOW_CREDENTIALS: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpassword}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    networks:
      - internal

  frontend:
    # Full nginx build — serves at port 80 and reverse-proxies /api → backend.
    # Rebuild after frontend changes: docker compose up --build --no-deps frontend
    container_name: garden-planner-frontend-dev
    build:
      context: ../web
      dockerfile: ../infra/web-frontend.Dockerfile
    image: garden_frontend_dev
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  grafana:
    container_name: garden-planner-grafana-dev
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      # Grafana is proxied by the nginx frontend at /admin/dashboard/
      GF_SERVER_ROOT_URL: "http://localhost/admin/dashboard"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    networks:
      - internal

networks:
  internal:
    driver: bridge
    name: garden-planner-dev
