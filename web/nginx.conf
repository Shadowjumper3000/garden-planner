server {
  listen 80;
  # Domain routing is handled by the upstream reverse proxy (e.g. Traefik).
  # nginx acts as a catch-all — it processes whatever the proxy forwards to it.
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/x-font-ttf font/opentype image/svg+xml;

  # ── Backend API ──────────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Grafana admin dashboard (/admin/dashboard/) ──────────────────────────────
  # Grafana must be configured with:
  #   GF_SERVER_ROOT_URL=http(s)://<host>/admin/dashboard
  #   GF_SERVER_SERVE_FROM_SUB_PATH=true
  location = /admin/dashboard {
    return 301 /admin/dashboard/;
  }
  location /admin/dashboard/ {
    proxy_pass         http://grafana:3000/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Health probe (forwarded to backend) ─────────────────────────────────────
  location /healthz {
    proxy_pass http://backend:8080/healthz;
  }

  # ── SPA fallback ─────────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
